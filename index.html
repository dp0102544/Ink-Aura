<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ink & Aura</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Parse SDK -->
    <script src="https://unpkg.com/parse/dist/parse.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= LOGIN / SIGNUP SECTION ================= -->

<div id="authSection">

    <form id="loginForm">
        <h3>Login</h3>
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <form id="signupForm">
        <h3>Sign Up</h3>
        <input type="text" id="newUsername" placeholder="New Username" required>
        <input type="password" id="newPassword" placeholder="New Password" required>
        <button type="submit">Sign Up</button>
    </form>

</div>

<!-- ================= HEADER ================= -->

<header class="top-bar">
    <div class="logo">🛍️ Ink & Aura</div>

    <div id="userInfo" style="display:none;">
        Welcome, <span id="currentUser"></span>
        <button onclick="logout()">Logout</button>
    </div>

    <div class="filters">
        <button onclick="filterCategory('all')" class="active">All</button>
        <button onclick="filterCategory('brush')">Brushes</button>
        <button onclick="filterCategory('color')">Colors</button>
        <button onclick="filterCategory('book')">Books</button>
        <button onclick="filterCategory('tool')">Tools</button>
    </div>

    <div class="search-container">
        <input type="text" id="search" placeholder="Search products..." onkeyup="searchProducts()">
        <span class="search-icon">🔍</span>
    </div>

    <div class="cart-info" onclick="openCart()" style="cursor:pointer;">
        🛒 <span id="cart-count">0</span>
    </div>
</header>

<h2 style="text-align:center;">Products</h2>

<!-- ================= PRODUCTS ================= -->

<div class="products">

    <div class="product" data-category="book">
        <h3>Sketch Book</h3>
        <img src="https://i.pinimg.com/736x/7a/44/55/7a4455115fbf5d63d10c0dc021aee328.jpg">
        <p>₹100</p>
        <button onclick="addToCart('Sketch Book',100)">Add to Cart</button>
    </div>

    <div class="product" data-category="color">
        <h3>Doms Colour Pencil</h3>
        <img src="https://tse1.mm.bing.net/th/id/OIP.NzXoLV73IsYPRw1q0JqMnAHaHa">
        <p>₹90</p>
        <button onclick="addToCart('Doms Colour Pencil',90)">Add to Cart</button>
    </div>

    <div class="product" data-category="color">
        <h3>Crayon</h3>
        <img src="https://domsindia.com/wp-content/uploads/2022/08/DOMS-Long-Wax-Crayons-12-Shades.jpg">
        <p>₹50</p>
        <button onclick="addToCart('Crayon',50)">Add to Cart</button>
    </div>

</div>

<footer>
    <p>© 2025 Ink & Aura</p>
    <p>Owner: Dhara Patel</p>
</footer>

<script src="script.js"></script>

<script>
/* ===============================
   PARSE INITIALIZATION
================================ */
Parse.initialize("YOUR_REAL_APP_ID", "YOUR_REAL_JS_KEY");
Parse.serverURL = "https://parseapi.back4app.com/";


/* ===============================
   AUTO LOGIN CHECK
================================ */
window.onload = function () {

    const currentUser = Parse.User.current();

    if (currentUser) {
        document.getElementById("authSection").style.display = "none";
        document.getElementById("userInfo").style.display = "block";
        document.getElementById("currentUser").innerText = currentUser.get("username");
    }
};


/* ===============================
   LOGIN
================================ */
document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    try {
        const user = await Parse.User.logIn(username, password);

        alert("Login Successful!");
        document.getElementById("authSection").style.display = "none";
        document.getElementById("userInfo").style.display = "block";
        document.getElementById("currentUser").innerText = user.get("username");

    } catch (error) {
        alert("Login Failed: " + error.message);
    }
});


/* ===============================
   SIGNUP
================================ */
document.getElementById("signupForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const username = document.getElementById("newUsername").value;
    const password = document.getElementById("newPassword").value;

    const user = new Parse.User();
    user.set("username", username);
    user.set("password", password);

    try {
        await user.signUp();
        alert("Signup Successful! Please login.");
    } catch (error) {
        alert("Signup Failed: " + error.message);
    }
});


/* ===============================
   LOGOUT
================================ */
async function logout() {
    await Parse.User.logOut();
    location.reload();
}
</script>

</body>
</html>
