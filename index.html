<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ink & Aura</title>

<script src="https://unpkg.com/parse/dist/parse.min.js"></script>

<link rel="stylesheet" href="style.css">

<style>

/* RESET */
body{
  margin:0;
  font-family: Arial;
  background:#f5f5f5;
}

/* NAVBAR */
.navbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 20px;
  background:white;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
  position:sticky;
  top:0;
  z-index:1000;
}

.logo{
  font-size:20px;
  font-weight:bold;
}

.search-bar{
  width:40%;
  padding:8px;
  border-radius:5px;
  border:1px solid #ccc;
}

.nav-right{
  display:flex;
  gap:15px;
  align-items:center;
}

/* CATEGORY SCROLL */
.category-scroll{
  display:flex;
  gap:10px;
  padding:10px;
  overflow-x:auto;
  background:white;
}

.category-btn{
  background:#eee;
  padding:8px 12px;
  border-radius:20px;
  cursor:pointer;
  white-space:nowrap;
}

/* BANNER */
.banner{
  background:#ff4081;
  color:white;
  text-align:center;
  padding:25px;
}

/* PRODUCTS GRID */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  padding:20px;
}

/* PRODUCT CARD */
.product{
  background:white;
  border-radius:10px;
  padding:10px;
  text-align:center;
  position:relative;
  transition:0.3s;
}

.product:hover{
  transform:scale(1.03);
}

.product img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:5px;
}

.product button{
  background:#ff4081;
  color:white;
  border:none;
  padding:8px;
  margin-top:5px;
  border-radius:5px;
  cursor:pointer;
  width:100%;
}

.badge{
  position:absolute;
  top:10px;
  left:10px;
  background:red;
  color:white;
  padding:3px 6px;
  font-size:12px;
  border-radius:5px;
}

/* TRUST */
.trust{
  display:flex;
  justify-content:space-around;
  background:white;
  padding:15px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  background:#222;
  color:white;
}

</style>
</head>

<body>

<!-- 🔝 NEW NAVBAR -->
<header class="navbar">

<div class="logo">🛍️ Ink & Aura</div>

<input type="text" id="search" placeholder="Search products..." class="search-bar" onkeyup="searchProducts()">

<div class="nav-right">
<span onclick="openLogin()">👤 Login</span>
<span onclick="openCart()">🛒 <span id="cart-count">0</span></span>
</div>

</header>

<!-- 🎯 CATEGORY SCROLL -->
<div class="category-scroll">
<div class="category-btn" onclick="filterCategory('all')">All</div>
<div class="category-btn" onclick="filterCategory('brush')">Brushes</div>
<div class="category-btn" onclick="filterCategory('color')">Colors</div>
<div class="category-btn" onclick="filterCategory('book')">Books</div>
<div class="category-btn" onclick="filterCategory('tool')">Tools</div>
</div>

<!-- 🎯 BANNER -->
<section class="banner">
<h2>🔥 Big Sale on Art Supplies</h2>
<p>Up to 50% OFF</p>
</section>

<h2 style="text-align:center;">Trending Products</h2>

<!-- PRODUCTS -->
<div class="products" id="product-list"></div>
<!-- TRUST -->
<section class="trust">
<div>🔒 Secure Checkout</div>
<div>🚚 Fast Delivery</div>
<div>↩️ Easy Returns</div>
<div>⭐ 4.8/5 Rating</div>
</section>
<!-- CART OVERLAY -->
<div class="cart-overlay" onclick="closeCart()"></div>

<!-- CART DRAWER -->
<div class="cart-drawer">

<div class="cart-header">
<h3>Your Cart 🛒</h3>
<button onclick="closeCart()">✖</button>
</div>

<ul id="cart-items"></ul>

<div class="cart-footer">
<p id="cart-total">Total: ₹0</p>
</div>

<button onclick="checkout()" class="checkout-btn">
Place Order
</button>

</div>
<!-- FOOTER -->
<footer>
<p>© 2025 Ink & Aura</p>
<p>Owner: Dhara Patel</p>
</footer>

<script src="script.js"></script>

</body>
</html>
