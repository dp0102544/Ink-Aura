<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ink & Aura</title>

<style>

/* BODY */
body{
  margin:0;
  font-family: Arial;
  background:#f5f5f5;
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:white;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.logo{
  font-size:20px;
  font-weight:bold;
  color:#9f7aea;
}

.search-bar{
  width:40%;
  padding:8px;
  border-radius:20px;
  border:1px solid #ccc;
}

/* CATEGORY */
.category-scroll{
  display:flex;
  gap:10px;
  padding:10px;
  background:white;
}

.category-btn{
  background:#eee;
  padding:8px 12px;
  border-radius:20px;
  cursor:pointer;
}

.category-btn:hover{
  background:#9f7aea;
  color:white;
}

/* BANNER */
.banner{
  background:linear-gradient(90deg,#9f7aea,#6c63ff);
  color:white;
  text-align:center;
  padding:25px;
}

/* PRODUCTS */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  padding:20px;
}

.product{
  background:white;
  border-radius:10px;
  padding:10px;
  text-align:center;
  position:relative;
  transition:0.3s;
}

.product:hover{
  transform:scale(1.03);
}

.product img{
  width:100%;
  height:150px;
  object-fit:cover;
}

/* PRICE */
.price{
  font-weight:bold;
}

.old-price{
  text-decoration:line-through;
  color:gray;
  font-size:12px;
}

.discount{
  color:green;
  font-size:12px;
}

/* BUTTON */
.product button{
  background:#9f7aea;
  color:white;
  border:none;
  padding:8px;
  margin-top:5px;
  border-radius:5px;
  cursor:pointer;
  width:100%;
}

/* BADGE */
.badge{
  position:absolute;
  top:10px;
  left:10px;
  background:red;
  color:white;
  padding:3px 6px;
  font-size:12px;
}

/* CART */
.cart-overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
}

.cart-overlay.active{
  display:block;
}

.cart-drawer{
  position:fixed;
  right:-350px;
  top:0;
  width:320px;
  height:100%;
  background:white;
  padding:20px;
  transition:0.3s;
}

.cart-drawer.active{
  right:0;
}

/* TRUST SECTION (LIKE MEESHO) */
.trust{
  display:flex;
  justify-content:space-around;
  background:white;
  padding:20px;
  margin-top:20px;
  border-top:1px solid #ddd;
}

/* FOOTER */
footer{
  background:#222;
  color:white;
  padding:20px;
  text-align:center;
}

</style>
</head>

<body>

<header class="navbar">
<div class="logo">🛍️ Ink & Aura</div>

<input type="text" id="search" placeholder="Search..." class="search-bar" onkeyup="searchProducts()">

<div onclick="openCart()">🛒 <span id="cart-count">0</span></div>
</header>

<div class="category-scroll">
<div class="category-btn" onclick="filterCategory('all')">All</div>
<div class="category-btn" onclick="filterCategory('brush')">Brushes</div>
<div class="category-btn" onclick="filterCategory('color')">Colors</div>
<div class="category-btn" onclick="filterCategory('book')">Books</div>
<div class="category-btn" onclick="filterCategory('tool')">Tools</div>
</div>

<section class="banner">
<h2>🔥 Big Sale on Art Supplies</h2>
<p>Up to 50% OFF</p>
</section>

<h2 style="text-align:center;">Trending Products</h2>

<div class="products" id="product-list"></div>

<!-- CART -->
<div class="cart-overlay" onclick="closeCart()"></div>

<div class="cart-drawer">
<h3>Your Cart 🛒</h3>
<ul id="cart-items"></ul>
<p id="cart-total">Total: ₹0</p>
<button onclick="checkout()">Place Order</button>
</div>

<!-- TRUST SECTION -->
<section class="trust">
<div>🔒 Secure Payment</div>
<div>🚚 Free Delivery</div>
<div>↩️ 7 Days Return</div>
<div>⭐ Best Quality</div>
</section>

<footer>
<p>© 2025 Ink & Aura</p>
<p>Owner: Dhara Patel</p>
</footer>

<script src="script.js"></script>

</body>
</html>
